<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Questionnaire Puissance</title>
<style>
:root{--text:#e8edf5;--muted:#8fa0b5;--line:rgba(255,255,255,.09);--accent:#66c0f4;--accent2:#1a9fff;--good:#67df8d;--bad:#ff6a76;--bg1:#0b1016;--bg2:#111923;--bg3:#0e141c;--shadow:0 18px 45px rgba(0,0,0,.38)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;min-height:100%;background:radial-gradient(circle at top, rgba(102,192,244,.12), transparent 35%),linear-gradient(180deg,var(--bg1),var(--bg2) 26%,var(--bg3) 100%);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
body{min-height:100vh}
.app{max-width:980px;margin:0 auto;padding:14px 14px 24px}
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;background:linear-gradient(180deg, rgba(102,192,244,.08), rgba(255,255,255,.02));border:1px solid var(--line);border-radius:22px;padding:14px;box-shadow:var(--shadow)}
.title{font-size:clamp(24px,5vw,36px);font-weight:900;line-height:1.05;margin:0}
.meta{margin-left:auto;display:flex;align-items:center;gap:10px;min-width:140px}
.badge{padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid var(--line);font-size:13px;color:#dbe7f5;white-space:nowrap}
.progress{flex:1;height:10px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden;border:1px solid rgba(255,255,255,.06)}
.progress>div{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .25s ease}
.viewport{min-height:calc(100vh - 150px);background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));border:1px solid var(--line);border-radius:26px;box-shadow:var(--shadow);overflow:hidden}
.screen{display:none;padding:20px 16px 18px;min-height:calc(100vh - 190px)}
.screen.active{display:flex;flex-direction:column}
.qtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.counter{font-size:14px;color:var(--muted);font-weight:700;letter-spacing:.02em}
.qtext{font-size:clamp(24px,5.4vw,42px);line-height:1.18;font-weight:900;margin:8px 0 24px;text-wrap:balance}
.answers{display:grid;grid-template-columns:repeat(5, minmax(0,1fr));gap:10px;margin-top:auto}
.choice{min-height:94px;border-radius:22px;border:1px solid var(--line);background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));display:grid;place-items:center;cursor:pointer;transition:transform .12s ease,border-color .12s ease,background .12s ease, box-shadow .12s ease}
.choice:active{transform:scale(.98)}
.choice.selected{border-color:rgba(102,192,244,.62);background:linear-gradient(180deg, rgba(102,192,244,.18), rgba(102,192,244,.06));box-shadow:inset 0 0 0 1px rgba(102,192,244,.18), 0 0 0 4px rgba(102,192,244,.08)}
.dot{border-radius:50%;display:grid;place-items:center;font-weight:900;color:white;text-shadow:0 1px 1px rgba(0,0,0,.35)}
.d1{width:26px;height:26px;background:linear-gradient(180deg,#ff7c7c,#d94c4c)}
.d2{width:36px;height:36px;background:linear-gradient(180deg,#ffc17a,#e88d3d)}
.d3{width:48px;height:48px;background:linear-gradient(180deg,#aab6c2,#7d8a97)}
.d4{width:60px;height:60px;background:linear-gradient(180deg,#98ea8b,#52b45e)}
.d5{width:72px;height:72px;background:linear-gradient(180deg,#66e8af,#18b36d)}
.nav{display:flex;gap:10px;margin-top:18px}
.navbtn,.finishbtn{flex:1;border:0;border-radius:18px;padding:15px 16px;font-size:16px;font-weight:800;cursor:pointer}
.prev{background:rgba(255,255,255,.06);color:#d9e5f2;border:1px solid var(--line)}
.next,.finishbtn{background:linear-gradient(180deg,#1fa4ff,#147fd0);color:white;box-shadow:0 12px 30px rgba(20,127,208,.28)}
.results{display:none;padding:18px}
.results.show{display:block}
.scorebox{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;margin-bottom:16px;padding:14px 16px;border-radius:20px;background:rgba(255,255,255,.035);border:1px solid var(--line)}
.scorelabel{font-size:15px;font-weight:800}
.scorevalue{font-size:clamp(28px,8vw,54px);font-weight:900}
.scorevalue small{font-size:.38em;color:var(--muted);font-weight:700}
.block{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:22px;padding:14px;margin-bottom:14px}
.sectiontitle{font-size:18px;font-weight:900;margin:0 0 12px}
.radarsCol{display:grid;grid-template-columns:1fr;gap:14px}
.radarcard{background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));border:1px solid var(--line);border-radius:22px;padding:16px}
.radarname{font-size:18px;font-weight:900;margin:0 0 10px;color:#e8f3ff}
.radarcanvas{display:block;width:100%;height:auto;margin:0 auto}
.groups{display:grid;gap:14px}
.group{background:rgba(255,255,255,.02);border:1px solid var(--line);border-radius:18px;padding:12px}
.group h3{margin:0 0 10px;font-size:16px;font-weight:900}
.stat{padding:8px 0}
.statline{display:flex;justify-content:space-between;gap:10px;margin-bottom:6px;font-size:14px}
.bar{height:12px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.05)}
.fill{height:100%;width:0;background:linear-gradient(90deg,#66c0f4,#8de1ff)}
.dual{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.col{border-radius:18px;padding:14px}
.col.good{background:rgba(103,223,141,.09);border:1px solid rgba(103,223,141,.22)}
.col.bad{background:rgba(255,106,118,.09);border:1px solid rgba(255,106,118,.22)}
.col h3{margin:0 0 10px;font-size:17px;font-weight:900}
.col.good h3{color:#b8ffd0}
.col.bad h3{color:#ffb1bb}
.col ul{margin:0;padding-left:20px}
.col li{margin:8px 0;line-height:1.45}
.footerbtns{display:flex;gap:10px;margin-top:18px}
.debug{margin-top:8px;color:#ffb1bb;font-size:12px;white-space:pre-wrap}
@media (max-width:760px){.dual{grid-template-columns:1fr}}
@media (max-width:640px){.topbar{display:block}.meta{margin-left:0;margin-top:10px}.viewport{min-height:calc(100vh - 120px)}.screen{min-height:calc(100vh - 160px);padding:18px 14px}.qtext{margin:8px 0 18px}.answers{gap:8px}.choice{min-height:86px}.d1{width:22px;height:22px}.d2{width:30px;height:30px}.d3{width:40px;height:40px}.d4{width:50px;height:50px}.d5{width:60px;height:60px}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1 class="title">Questionnaire Puissance</h1>
    <div class="meta">
      <div class="badge" id="progressText"></div>
      <div class="progress"><div id="progressBar"></div></div>
    </div>
  </div>
  <div class="viewport">
    <section class="screen active" id="questionScreen">
      <div class="qtop"><div class="counter" id="counter"></div></div>
      <div class="qtext" id="qtext"></div>
      <div class="answers" id="answers"></div>
      <div class="nav">
        <button type="button" class="navbtn prev" id="prevBtn">Précédent</button>
        <button type="button" class="navbtn next" id="nextBtn">Suivant</button>
      </div>
      <div class="debug" id="debug"></div>
    </section>
    <section class="screen results" id="resultsScreen">
      <div class="scorebox">
        <div class="scorelabel">Total stat</div>
        <div class="scorevalue" id="totalScore"></div>
      </div>
      <div class="block">
        <h2 class="sectiontitle">Radars par catégorie</h2>
        <div class="radarsCol" id="radarsWrap"></div>
      </div>
      <div class="block">
        <h2 class="sectiontitle">Stats par catégorie</h2>
        <div class="groups" id="groupBars"></div>
      </div>
      <div class="block">
        <div class="dual">
          <div class="col good">
            <h3>3 pistes d’amélioration</h3>
            <ul id="goodList"></ul>
          </div>
          <div class="col bad">
            <h3>3 erreurs à éviter</h3>
            <ul id="avoidList"></ul>
          </div>
        </div>
      </div>
      <div class="footerbtns">
        <button type="button" class="navbtn prev" id="backBtn">Retour</button>
        <button type="button" class="finishbtn" id="restartBtn">Recommencer</button>
      </div>
    </section>
  </div>
</div>

stance": 5.0, "Poids": 2.0, "Efficacité énergétique": -10.0, "Vitesse de récupération (sommeil)": -2.0, "Mouchoirs": 1.0, "Puissance cognitive": -23.0, "altruisme": 5.0, "Sécurité": -40.0, "Confiance": -9.0, "Courage": -20.0, "Influence": -20.0, "Angoisse": -20.0}, "leftPhrase": "", "rightPhrase": ""}, {"question": "As-tu mal à ton genou?", "stats": {"Attaque": -30.0, "Vitesse": -40.0, "Urbanisme": 20.0, "Charisme": -25.0, "Argent": -15.0, "Sociabilité": 10.0, "PV": -30.0, "Résistance": -30.0, "Poids": -1.0, "Efficacité énergétique": -5.0, "Vitesse de récupération (sommeil)": -9.0, "Puissance cognitive": -2.0, "altruisme": 10.0, "Sécurité": -30.0, "Confiance": -15.0, "Courage": -5.0, "Angoisse": -20.0}, "leftPhrase": "", "rightPhrase": ""}, {"question": "À quelle fréquence bois-tu de l'alcool", "stats": {"Attaque": 50.0, "Vitesse": -10.0, "Urbanisme": -5.0, "Charisme": -20.0, "Argent": -30.0, "Sociabilité": 20.0, "Constance": -30.0, "PV": -45.0, "Résistance": -35.0, "Poids": 25.0, "Efficacité énergétique": -30.0, "Vitesse de récupération (sommeil)": -5.0, "Mouchoirs": 10.0, "Puissance cognitive": -30.0, "altruisme": -30.0, "Sécurité": -30.0, "Confiance": 30.0, "Courage": 10.0, "Influence": 5.0, "Angoisse": 15.0}, "leftPhrase": "", "rightPhrase": ""}];
const STATS = ["Attaque", "Vitesse", "Urbanisme", "Charisme", "Argent", "Sociabilité", "Constance", "PV", "Résistance", "Poids", "Efficacité énergétique", "Vitesse de récupération (sommeil)", "Mouchoirs", "Puissance cognitive", "altruisme", "Sécurité", "Confiance", "Courage", "Influence", "Angoisse"];
const MAX_PER_STAT = {"Attaque": 421.0, "Vitesse": 402.0, "Urbanisme": 185.0, "Charisme": 448.0, "Argent": 346.0, "Sociabilité": 319.0, "Constance": 287.0, "PV": 261.0, "Résistance": 287.0, "Poids": 312.0, "Efficacité énergétique": 389.0, "Vitesse de récupération (sommeil)": 200.0, "Mouchoirs": 141.0, "Puissance cognitive": 398.0, "altruisme": 225.0, "Sécurité": 465.0, "Confiance": 277.0, "Courage": 292.0, "Influence": 186.0, "Angoisse": 417.0};
const CATEGORIES = {"Physique": ["Attaque", "Vitesse", "PV", "Résistance", "Poids", "Efficacité énergétique", "Vitesse de récupération (sommeil)"], "Société": ["Urbanisme", "Charisme", "Argent", "Sociabilité", "altruisme", "Sécurité", "Confiance", "Courage", "Influence"], "Autres": ["Constance", "Mouchoirs", "Puissance cognitive", "Angoisse"]};
const TOTALMAX = 2000;
const debugEl = document.getElementById('debug');
function debug(msg){ if(debugEl) debugEl.textContent = msg || ''; }

function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }
const questions = shuffle(QUESTIONS);
const answers = new Array(questions.length).fill(null);
let current = 0;

const progressText=document.getElementById('progressText');
const progressBar=document.getElementById('progressBar');
const counter=document.getElementById('counter');
const qtext=document.getElementById('qtext');
const answersEl=document.getElementById('answers');
const questionScreen=document.getElementById('questionScreen');
const resultsScreen=document.getElementById('resultsScreen');
const totalScore=document.getElementById('totalScore');
const radarsWrap=document.getElementById('radarsWrap');
const groupBars=document.getElementById('groupBars');
const goodList=document.getElementById('goodList');
const avoidList=document.getElementById('avoidList');
const prevBtn=document.getElementById('prevBtn');
const nextBtn=document.getElementById('nextBtn');
const backBtn=document.getElementById('backBtn');
const restartBtn=document.getElementById('restartBtn');

const OPTIONS=[{value:1,label:'--',cls:'d1'},{value:2,label:'-',cls:'d2'},{value:3,label:'o',cls:'d3'},{value:4,label:'+',cls:'d4'},{value:5,label:'++',cls:'d5'}];

function safeQuestion(index){
  const clamped = Math.max(0, Math.min(index, questions.length - 1));
  current = clamped;
  return questions[clamped];
}
function updateProgress(){ progressText.textContent=(current+1)+' / '+questions.length; progressBar.style.width=(((current+1)/questions.length)*100)+'%'; }
function renderQuestion(){
  const q=safeQuestion(current);
  counter.textContent=(current+1)+' / '+questions.length;
  qtext.textContent=(q && q.question) ? q.question : '';
  answersEl.innerHTML='';
  OPTIONS.forEach(opt=>{
    const btn=document.createElement('button');
    btn.type='button';
    btn.className='choice'+(answers[current]===opt.value?' selected':'');
    btn.innerHTML='<div class="dot '+opt.cls+'">'+opt.label+'</div>';
    btn.addEventListener('click', function(){
      answers[current]=opt.value;
      renderQuestion();
      if(current<questions.length-1){
        setTimeout(function(){ current+=1; updateProgress(); renderQuestion(); window.scrollTo({top:0, behavior:'smooth'}); },120);
      }
    });
    answersEl.appendChild(btn);
  });
  prevBtn.disabled=current===0;
  nextBtn.textContent=current===questions.length-1?'Voir les résultats':'Suivant';
  debug('');
}
function contribution(weight, answer){ if(weight>0) return weight*((answer-1)/4); if(weight<0) return Math.abs(weight)*((5-answer)/4); return 0; }
function computeDirection(meta, answer){
  let gainLeft=0,gainRight=0;
  for(const stat in meta.stats){ const w=Number(meta.stats[stat]); gainLeft += contribution(w,1)-contribution(w,answer); gainRight += contribution(w,5)-contribution(w,answer); }
  return {best: gainLeft>gainRight?'left':'right', gain: Math.max(gainLeft, gainRight)};
}
function computeResults(){
  const raw={}; STATS.forEach(s=>raw[s]=0);
  const normalized={}; const improvements=[]; const mistakes=[];
  for(let i=0;i<questions.length;i++){
    const q=questions[i], answer=answers[i];
    if(!q || answer==null) continue;
    STATS.forEach(stat=>{ if(Object.prototype.hasOwnProperty.call(q.stats, stat)){ raw[stat]+=contribution(Number(q.stats[stat]), answer); }});
    const dir=computeDirection(q, answer);
    if(dir.gain>0.01){
      const betterPhrase=dir.best==='left'?q.leftPhrase:q.rightPhrase;
      const oppositePhrase=dir.best==='left'?q.rightPhrase:q.leftPhrase;
      if(betterPhrase) improvements.push({phrase:betterPhrase.trim(), score:dir.gain, question:q.question || ''});
      if(oppositePhrase) mistakes.push({phrase:oppositePhrase.trim(), score:dir.gain, question:q.question || ''});
    }
  }
  STATS.forEach(stat=>{ normalized[stat]=MAX_PER_STAT[stat]>0?Math.round((raw[stat]/MAX_PER_STAT[stat])*100):0; });
  return {normalized, improvements, mistakes};
}
function topUnique(items, n){
  const seenPhrase=new Set(), seenQuestion=new Set(), out=[];
  items.sort((a,b)=>b.score-a.score);
  for(const item of items){
    const kp=(item.phrase||'').toLowerCase().trim(), kq=(item.question||'').toLowerCase().trim();
    if(seenPhrase.has(kp)||seenQuestion.has(kq)) continue;
    seenPhrase.add(kp); seenQuestion.add(kq); out.push(item);
    if(out.length>=n) break;
  }
  return out;
}
function renderGroupBars(normalized){
  groupBars.innerHTML='';
  Object.entries(CATEGORIES).forEach(([groupName, groupStats])=>{
    const valid=groupStats.filter(s=>STATS.includes(s));
    if(!valid.length) return;
    const group=document.createElement('section');
    group.className='group';
    group.innerHTML='<h3>'+groupName+'</h3>';
    valid.forEach(stat=>{
      const val=normalized[stat]||0;
      const row=document.createElement('div');
      row.className='stat';
      row.innerHTML='<div class="statline"><div>'+stat+'</div><div><strong>'+val+'</strong>/100</div></div><div class="bar"><div class="fill" style="width:'+val+'%"></div></div>';
      group.appendChild(row);
    });
    groupBars.appendChild(group);
  });
}
function wrapText(ctx, text, maxWidth){
  const words=String(text).split(' '), lines=[]; let line='';
  words.forEach(word=>{ const test=line?line+' '+word:word; if(ctx.measureText(test).width>maxWidth && line){ lines.push(line); line=word; } else line=test; });
  if(line) lines.push(line); return lines;
}
function drawRadar(canvas, labels, values){
  const ctx=canvas.getContext('2d'); if(!ctx || !labels.length) return;
  const parentWidth = canvas.parentElement ? canvas.parentElement.clientWidth : 0;
  const cssW = Math.max(220, Math.min((parentWidth || 0) - 12, 760));
  const cssH = Math.max(220, Math.round(cssW * 0.9));
  const dpr=Math.max(1, window.devicePixelRatio||1);
  canvas.style.width=cssW+'px';
  canvas.style.height=cssH+'px';
  canvas.width=Math.max(1, Math.round(cssW*dpr));
  canvas.height=Math.max(1, Math.round(cssH*dpr));
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const w=cssW,h=cssH,cx=w/2,cy=h/2;
  const radius=Math.max(40, Math.min(w*0.33,h*0.34));
  ctx.clearRect(0,0,w,h);
  const glow=ctx.createRadialGradient(cx,cy,10,cx,cy,Math.max(20, radius*1.1));
  glow.addColorStop(0,'rgba(102,192,244,.12)'); glow.addColorStop(1,'rgba(102,192,244,0)');
  ctx.fillStyle=glow; ctx.fillRect(0,0,w,h);
  for(let level=1;level<=5;level++){
    const r=radius*level/5;
    ctx.beginPath();
    labels.forEach((_,i)=>{ const a=-Math.PI/2+i*(Math.PI*2/labels.length),x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r; if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); });
    ctx.closePath(); ctx.strokeStyle=level===5?'rgba(255,255,255,.18)':'rgba(255,255,255,.08)'; ctx.lineWidth=level===5?1.6:1; ctx.stroke();
  }
  labels.forEach((label,i)=>{
    const a=-Math.PI/2+i*(Math.PI*2/labels.length),x=cx+Math.cos(a)*radius,y=cy+Math.sin(a)*radius;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(x,y); ctx.strokeStyle='rgba(255,255,255,.08)'; ctx.lineWidth=1; ctx.stroke();
    const lx=cx+Math.cos(a)*(radius+32),ly=cy+Math.sin(a)*(radius+32);
    ctx.fillStyle='#eef7ff'; ctx.font='700 15px system-ui, sans-serif';
    ctx.textAlign=Math.cos(a)>0.25?'left':(Math.cos(a)<-0.25?'right':'center');
    ctx.textBaseline=Math.sin(a)>0.35?'top':(Math.sin(a)<-0.35?'bottom':'middle');
    wrapText(ctx,label,120).forEach((line,li)=>ctx.fillText(line,lx,ly+li*16));
  });
  ctx.beginPath();
  labels.forEach((label,i)=>{ const v=(values[i]||0)/100,a=-Math.PI/2+i*(Math.PI*2/labels.length),x=cx+Math.cos(a)*radius*v,y=cy+Math.sin(a)*radius*v; if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); });
  ctx.closePath();
  const poly=ctx.createLinearGradient(cx-radius,cy-radius,cx+radius,cy+radius);
  poly.addColorStop(0,'rgba(102,192,244,.38)'); poly.addColorStop(1,'rgba(46,130,255,.16)');
  ctx.fillStyle=poly; ctx.strokeStyle='#8fe6ff'; ctx.lineWidth=4; ctx.shadowColor='rgba(102,192,244,.25)'; ctx.shadowBlur=16; ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;
  labels.forEach((label,i)=>{ const v=(values[i]||0)/100,a=-Math.PI/2+i*(Math.PI*2/labels.length),x=cx+Math.cos(a)*radius*v,y=cy+Math.sin(a)*radius*v; ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.fillStyle='#f7fdff'; ctx.fill(); ctx.strokeStyle='#66c0f4'; ctx.lineWidth=2; ctx.stroke(); });
}
function renderRadars(normalized){
  radarsWrap.innerHTML='';
  Object.entries(CATEGORIES).forEach(([groupName, groupStats])=>{
    const valid=groupStats.filter(s=>STATS.includes(s));
    if(!valid.length) return;
    const card=document.createElement('section');
    card.className='radarcard';
    card.innerHTML='<h3 class="radarname">'+groupName+'</h3><canvas class="radarcanvas"></canvas>';
    radarsWrap.appendChild(card);
    drawRadar(card.querySelector('canvas'), valid, valid.map(s=>normalized[s]||0));
  });
}
function renderAdvice(improvements, mistakes){
  goodList.innerHTML=''; avoidList.innerHTML='';
  topUnique(improvements,3).forEach(item=>{ const li=document.createElement('li'); li.textContent=item.phrase; goodList.appendChild(li); });
  topUnique(mistakes,3).forEach(item=>{ const li=document.createElement('li'); li.textContent=item.phrase; avoidList.appendChild(li); });
}
function showResults(){
  const missing=answers.findIndex(a=>a==null);
  if(missing!==-1){ current=missing; updateProgress(); renderQuestion(); debug('Il manque une réponse à la question '+(missing+1)); return; }
  const result=computeResults();
  let total=0; STATS.forEach(s=>{ total+=result.normalized[s]; });
  totalScore.innerHTML=total+' <small>/ '+TOTALMAX+'</small>';
  questionScreen.classList.remove('active');
  resultsScreen.classList.add('active','show');
  requestAnimationFrame(function(){
    renderGroupBars(result.normalized);
    renderRadars(result.normalized);
    renderAdvice(result.improvements, result.mistakes);
  });
  progressText.textContent='Terminé'; progressBar.style.width='100%'; debug(''); window.scrollTo({top:0, behavior:'smooth'});
}
function backToLast(){ resultsScreen.classList.remove('active','show'); questionScreen.classList.add('active'); current=questions.length-1; updateProgress(); renderQuestion(); }
prevBtn.addEventListener('click', function(){ if(current>0){ current-=1; updateProgress(); renderQuestion(); }});
nextBtn.addEventListener('click', function(){
  if(answers[current]==null){ debug('Choisissez une réponse.'); return; }
  if(current===questions.length-1) showResults();
  else{ current+=1; updateProgress(); renderQuestion(); window.scrollTo({top:0, behavior:'smooth'}); }
});
backBtn.addEventListener('click', backToLast);
restartBtn.addEventListener('click', function(){ window.location.reload(); });
window.addEventListener('resize', function(){ if(resultsScreen.classList.contains('show')){ const result=computeResults(); renderRadars(result.normalized); }});
updateProgress(); renderQuestion();
})();
</script>
