<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Questionnaire Puissance</title>
<style>
:root {
  --text:#e8edf5; --muted:#8fa0b5; --line:rgba(255,255,255,.09);
  --accent:#66c0f4; --accent2:#1a9fff; --good:#67df8d; --bad:#ff6a76;
  --bg1:#0b1016; --bg2:#111923; --bg3:#0e141c; --shadow:0 18px 45px rgba(0,0,0,.38);
}
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body {
  margin:0; padding:0; min-height:100%;
  background:radial-gradient(circle at top, rgba(102,192,244,.12), transparent 35%), linear-gradient(180deg,var(--bg1),var(--bg2) 26%,var(--bg3) 100%);
  color:var(--text); font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}
.app { max-width:980px; margin:0 auto; padding:14px 14px 24px; }
.topbar {
  display:flex; align-items:center; gap:10px; margin-bottom:12px;
  background:linear-gradient(180deg, rgba(102,192,244,.08), rgba(255,255,255,.02));
  border:1px solid var(--line); border-radius:22px; padding:14px; box-shadow:var(--shadow);
}
.title { font-size:clamp(24px, 5vw, 36px); font-weight:900; margin:0; }
.meta { margin-left:auto; display:flex; align-items:center; gap:10px; min-width:160px; }
.badge { padding:8px 12px; border-radius:999px; background:rgba(255,255,255,.05); border:1px solid var(--line); font-size:13px; }
.progress { flex:1; height:10px; background:rgba(255,255,255,.06); border-radius:999px; overflow:hidden; border:1px solid rgba(255,255,255,.06); }
.progress > div { height:100%; width:0; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width .25s ease; }

.panel {
  min-height:calc(100vh - 150px);
  background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
  border:1px solid var(--line); border-radius:26px; box-shadow:var(--shadow); overflow:hidden;
}
.view { padding:20px 16px 18px; }
.qtop { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.counter { font-size:14px; color:var(--muted); font-weight:700; }
.qtext { font-size:clamp(24px, 5.2vw, 40px); line-height:1.18; font-weight:900; margin:8px 0 24px; text-wrap:balance; }
.answers { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:10px; margin-top:28px; }
.choice {
  min-height:100px; border-radius:22px; border:1px solid var(--line);
  background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; cursor:pointer;
  transition:transform .12s ease,border-color .12s ease,background .12s ease, box-shadow .12s ease;
}
.choice.selected {
  border-color:rgba(102,192,244,.62);
  background:linear-gradient(180deg, rgba(102,192,244,.18), rgba(102,192,244,.06));
  box-shadow:inset 0 0 0 1px rgba(102,192,244,.18), 0 0 0 4px rgba(102,192,244,.08);
}
.dot { border-radius:50%; display:grid; place-items:center; font-weight:900; color:white; text-shadow:0 1px 1px rgba(0,0,0,.35); }
.d1 { width:26px; height:26px; background:linear-gradient(180deg,#ff7c7c,#d94c4c); }
.d2 { width:36px; height:36px; background:linear-gradient(180deg,#ffc17a,#e88d3d); }
.d3 { width:48px; height:48px; background:linear-gradient(180deg,#aab6c2,#7d8a97); }
.d4 { width:60px; height:60px; background:linear-gradient(180deg,#98ea8b,#52b45e); }
.d5 { width:72px; height:72px; background:linear-gradient(180deg,#66e8af,#18b36d); }
.mark { font-size:13px; font-weight:800; color:#d4e3f3; }
.nav { display:flex; gap:10px; margin-top:22px; }
.navbtn, .finishbtn { flex:1; border:0; border-radius:18px; padding:15px 16px; font-size:16px; font-weight:800; cursor:pointer; }
.prev { background:rgba(255,255,255,.06); color:#d9e5f2; border:1px solid var(--line); }
.next, .finishbtn { background:linear-gradient(180deg,#1fa4ff,#147fd0); color:white; box-shadow:0 12px 30px rgba(20,127,208,.28); }
.hidden { display:none !important; }
.scorebox {
  display:grid; grid-template-columns:1fr auto; gap:10px; align-items:center; margin-bottom:16px; padding:14px 16px;
  border-radius:20px; background:rgba(255,255,255,.035); border:1px solid var(--line);
}
.scorelabel { font-size:15px; font-weight:800; }
.scorevalue { font-size:clamp(28px,8vw,54px); font-weight:900; }
.scorevalue small { font-size:.38em; color:var(--muted); font-weight:700; }
.block { background:rgba(255,255,255,.03); border:1px solid var(--line); border-radius:22px; padding:14px; margin-bottom:14px; }
.sectiontitle { font-size:18px; font-weight:900; margin:0 0 12px; }
.radarsCol { display:grid; grid-template-columns:1fr; gap:14px; }
.radarcard { background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015)); border:1px solid var(--line); border-radius:22px; padding:16px; }
.radarname { font-size:18px; font-weight:900; margin:0 0 10px; color:#e8f3ff; }
.radarcanvas { display:block; width:100%; height:auto; margin:0 auto; }
.groups { display:grid; gap:14px; }
.group { background:rgba(255,255,255,.02); border:1px solid var(--line); border-radius:18px; padding:12px; }
.group h3 { margin:0 0 10px; font-size:16px; font-weight:900; }
.stat { padding:8px 0; }
.statline { display:flex; justify-content:space-between; gap:10px; margin-bottom:6px; font-size:14px; }
.bar { height:12px; border-radius:999px; overflow:hidden; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.05); }
.fill { height:100%; width:0; background:linear-gradient(90deg,#66c0f4,#8de1ff); }
.dual { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.col { border-radius:18px; padding:14px; }
.col.good { background:rgba(103,223,141,.09); border:1px solid rgba(103,223,141,.22); }
.col.bad { background:rgba(255,106,118,.09); border:1px solid rgba(255,106,118,.22); }
.col h3 { margin:0 0 10px; font-size:17px; font-weight:900; }
.col.good h3 { color:#b8ffd0; }
.col.bad h3 { color:#ffb1bb; }
.col ul { margin:0; padding-left:20px; }
.col li { margin:8px 0; line-height:1.45; }
.footerbtns { display:flex; gap:10px; margin-top:18px; }
@media (max-width:760px) { .dual { grid-template-columns:1fr; } }
@media (max-width:640px) {
  .topbar { display:block; }
  .meta { margin-left:0; margin-top:10px; }
  .answers { gap:8px; }
  .choice { min-height:88px; }
  .d1 { width:22px; height:22px; } .d2 { width:30px; height:30px; } .d3 { width:40px; height:40px; } .d4 { width:50px; height:50px; } .d5 { width:60px; height:60px; }
}
</style>
</head>

<div class="app">

    </section>
  </div>
</div>

  progressBar.style.width = (((currentIndex + 1) / questions.length) * 100) + '%';
}

function renderQuestion() {
  const q = questions[currentIndex];
  counter.textContent = (currentIndex + 1) + ' / ' + questions.length;
  qtext.textContent = q.question;
  answersEl.innerHTML = '';
  OPTIONS.forEach(opt => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'choice' + (answers[currentIndex] === opt.value ? ' selected' : '');
    btn.innerHTML = '<div class="dot ' + opt.cls + '">' + opt.label + '</div><div class="mark">' + opt.label + '</div>';
    btn.onclick = () => {
      answers[currentIndex] = opt.value;
      renderQuestion();
      if (currentIndex < questions.length - 1) {
        setTimeout(() => {
          currentIndex += 1;
          updateProgress();
          renderQuestion();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }, 120);
      }
    };
    answersEl.appendChild(btn);
  });
  document.getElementById('prevBtn').disabled = currentIndex === 0;
  document.getElementById('nextBtn').textContent = currentIndex === questions.length - 1 ? 'Voir les résultats' : 'Suivant';
}

function contribution(weight, answer) {
  if (weight > 0) return weight * ((answer - 1) / 4);
  if (weight < 0) return Math.abs(weight) * ((5 - answer) / 4);
  return 0;
}

function computeDirection(meta, answer) {
  let gainLeft = 0;
  let gainRight = 0;
  for (const stat in meta.stats) {
    const w = Number(meta.stats[stat]);
    gainLeft += contribution(w, 1) - contribution(w, answer);
    gainRight += contribution(w, 5) - contribution(w, answer);
  }
  const best = gainLeft > gainRight ? 'left' : 'right';
  return { gainLeft, gainRight, best, gain: Math.max(gainLeft, gainRight) };
}

function computeResults() {
  const raw = Object.fromEntries(STATS.map(s => [s, 0]));
  const normalized = {};
  const improvements = [];
  const mistakes = [];

  for (let i = 0; i < questions.length; i++) {
    const q = questions[i];
    const answer = answers[i];
    if (answer == null) continue;

    for (const stat of STATS) {
      if (Object.prototype.hasOwnProperty.call(q.stats, stat)) {
        raw[stat] += contribution(Number(q.stats[stat]), answer);
      }
    }

    const dir = computeDirection(q, answer);
    if (dir.gain > 0.01) {
      const betterPhrase = dir.best === 'left' ? q.leftPhrase : q.rightPhrase;
      const oppositePhrase = dir.best === 'left' ? q.rightPhrase : q.leftPhrase;
      if (betterPhrase) improvements.push({ phrase: betterPhrase.trim(), score: dir.gain });
      if (oppositePhrase) mistakes.push({ phrase: oppositePhrase.trim(), score: dir.gain });
    }
  }

  for (const stat of STATS) {
    normalized[stat] = MAX_PER_STAT[stat] > 0 ? Math.round((raw[stat] / MAX_PER_STAT[stat]) * 100) : 0;
  }

  return { normalized, improvements, mistakes };
}

function topUnique(items, n) {
  const seen = new Set();
  const out = [];
  items.sort((a, b) => b.score - a.score);
  for (const item of items) {
    const key = item.phrase.toLowerCase().trim();
    if (seen.has(key)) continue;
    seen.add(key);
    out.push(item);
    if (out.length >= n) break;
  }
  return out;
}

function renderGroupBars(normalized) {
  groupBars.innerHTML = '';
  Object.entries(CATEGORIES).forEach(([groupName, groupStats]) => {
    const valid = groupStats.filter(s => STATS.includes(s));
    if (!valid.length) return;
    const group = document.createElement('section');
    group.className = 'group';
    group.innerHTML = '<h3>' + groupName + '</h3>';
    valid.forEach(stat => {
      const val = normalized[stat] || 0;
      const row = document.createElement('div');
      row.className = 'stat';
      row.innerHTML = '<div class="statline"><div>' + stat + '</div><div><strong>' + val + '</strong>/100</div></div><div class="bar"><div class="fill" style="width:' + val + '%"></div></div>';
      group.appendChild(row);
    });
    groupBars.appendChild(group);
  });
}

function wrapText(ctx, text, maxWidth) {
  const words = String(text).split(' ');
  const lines = [];
  let line = '';
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

function drawRadar(canvas, labels, values) {
  const ctx = canvas.getContext('2d');
  const dpr = Math.max(1, window.devicePixelRatio || 1);
  const cssW = Math.min(canvas.parentElement.clientWidth - 12, 760);
  const cssH = Math.round(cssW * 0.9);
  canvas.style.width = cssW + 'px';
  canvas.style.height = cssH + 'px';
  canvas.width = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const w = cssW, h = cssH, cx = w / 2, cy = h / 2;
  const radius = Math.min(w * 0.33, h * 0.34);
  ctx.clearRect(0, 0, w, h);

  const glow = ctx.createRadialGradient(cx, cy, 10, cx, cy, radius * 1.1);
  glow.addColorStop(0, 'rgba(102,192,244,.12)');
  glow.addColorStop(1, 'rgba(102,192,244,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, w, h);

  for (let level = 1; level <= 5; level++) {
    const r = radius * level / 5;
    ctx.beginPath();
    labels.forEach((_, i) => {
      const a = -Math.PI / 2 + i * (Math.PI * 2 / labels.length);
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.closePath();
    ctx.strokeStyle = level === 5 ? 'rgba(255,255,255,.18)' : 'rgba(255,255,255,.08)';
    ctx.lineWidth = level === 5 ? 1.6 : 1;
    ctx.stroke();
  }

  labels.forEach((label, i) => {
    const a = -Math.PI / 2 + i * (Math.PI * 2 / labels.length);
    const x = cx + Math.cos(a) * radius;
    const y = cy + Math.sin(a) * radius;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(x, y);
    ctx.strokeStyle = 'rgba(255,255,255,.08)';
    ctx.lineWidth = 1;
    ctx.stroke();

    const lx = cx + Math.cos(a) * (radius + 32);
    const ly = cy + Math.sin(a) * (radius + 32);
    ctx.fillStyle = '#eef7ff';
    ctx.font = '700 15px system-ui, sans-serif';
    ctx.textAlign = Math.cos(a) > 0.25 ? 'left' : (Math.cos(a) < -0.25 ? 'right' : 'center');
    ctx.textBaseline = Math.sin(a) > 0.35 ? 'top' : (Math.sin(a) < -0.35 ? 'bottom' : 'middle');
    wrapText(ctx, label, 120).forEach((line, li) => ctx.fillText(line, lx, ly + li * 16));
  });

  ctx.beginPath();
  labels.forEach((label, i) => {
    const v = (values[i] || 0) / 100;
    const a = -Math.PI / 2 + i * (Math.PI * 2 / labels.length);
    const x = cx + Math.cos(a) * radius * v;
    const y = cy + Math.sin(a) * radius * v;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.closePath();
  const poly = ctx.createLinearGradient(cx - radius, cy - radius, cx + radius, cy + radius);
  poly.addColorStop(0, 'rgba(102,192,244,.38)');
  poly.addColorStop(1, 'rgba(46,130,255,.16)');
  ctx.fillStyle = poly;
  ctx.strokeStyle = '#8fe6ff';
  ctx.lineWidth = 4;
  ctx.shadowColor = 'rgba(102,192,244,.25)';
  ctx.shadowBlur = 16;
  ctx.fill();
  ctx.stroke();
  ctx.shadowBlur = 0;

  labels.forEach((label, i) => {
    const v = (values[i] || 0) / 100;
    const a = -Math.PI / 2 + i * (Math.PI * 2 / labels.length);
    const x = cx + Math.cos(a) * radius * v;
    const y = cy + Math.sin(a) * radius * v;
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#f7fdff';
    ctx.fill();
    ctx.strokeStyle = '#66c0f4';
    ctx.lineWidth = 2;
    ctx.stroke();
  });
}

function renderRadars(normalized) {
  radarsWrap.innerHTML = '';
  Object.entries(CATEGORIES).forEach(([groupName, groupStats]) => {
    const valid = groupStats.filter(s => STATS.includes(s));
    if (!valid.length) return;
    const card = document.createElement('section');
    card.className = 'radarcard';
    card.innerHTML = '<h3 class="radarname">' + groupName + '</h3><canvas class="radarcanvas"></canvas>';
    radarsWrap.appendChild(card);
    drawRadar(card.querySelector('canvas'), valid, valid.map(s => normalized[s] || 0));
  });
}

function renderAdvice(improvements, mistakes) {
  goodList.innerHTML = '';
  avoidList.innerHTML = '';
  topUnique(improvements, 3).forEach(item => {
    const li = document.createElement('li');
    li.textContent = item.phrase;
    goodList.appendChild(li);
  });
  topUnique(mistakes, 3).forEach(item => {
    const li = document.createElement('li');
    li.textContent = item.phrase;
    avoidList.appendChild(li);
  });
}

function showResults() {
  const missing = answers.findIndex(a => a == null);
  if (missing !== -1) {
    currentIndex = missing;
    updateProgress();
    renderQuestion();
    return;
  }
  const result = computeResults();
  let total = 0;
  STATS.forEach(s => { total += result.normalized[s]; });
  totalScore.innerHTML = total + ' <small>/ ' + (STATS.length * 100) + '</small>';
  renderRadars(result.normalized);
  renderGroupBars(result.normalized);
  renderAdvice(result.improvements, result.mistakes);
  questionView.classList.add('hidden');
  resultsView.classList.remove('hidden');
  progressText.textContent = 'Terminé';
  progressBar.style.width = '100%';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById('prevBtn').onclick = () => {
  if (currentIndex > 0) {
    currentIndex -= 1;
    updateProgress();
    renderQuestion();
  }
};

document.getElementById('nextBtn').onclick = () => {
  if (answers[currentIndex] == null) return;
  if (currentIndex === questions.length - 1) {
    showResults();
  } else {
    currentIndex += 1;
    updateProgress();
    renderQuestion();
  }
};

document.getElementById('backBtn').onclick = () => {
  resultsView.classList.add('hidden');
  questionView.classList.remove('hidden');
  currentIndex = questions.length - 1;
  updateProgress();
  renderQuestion();
};

document.getElementById('restartBtn').onclick = () => window.location.reload();

window.addEventListener('resize', () => {
  if (!resultsView.classList.contains('hidden')) {
    const result = computeResults();
    renderRadars(result.normalized);
  }
});

updateProgress();
renderQuestion();
})();
</script>
</body>
